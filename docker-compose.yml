services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: senha123
      POSTGRES_DB: erpdb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://erp:senha123@db:5432/erpdb
      JWT_SECRET: super-segredo
      PORT: 3000
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  db_data:
